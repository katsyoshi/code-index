name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install sqlite3
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /tmp/code-index-bin .

      - name: Smoke test
        run: |
          tmpdir="$(mktemp -d)"
          /tmp/code-index-bin init --db "$tmpdir/init.sqlite" .
          /tmp/code-index-bin status --db "$tmpdir/init.sqlite"
          /tmp/code-index-bin stats --db "$tmpdir/init.sqlite"
          /tmp/code-index-bin rebuild .
          /tmp/code-index-bin update .
          /tmp/code-index-bin status --root .
          /tmp/code-index-bin stats --root .
          /tmp/code-index-bin metrics --root .
